name: Release

# Cut a release + auto-updater feed by pushing a version tag, e.g.:
#   git tag v0.1.1 && git push origin v0.1.1
# (Keep the tag in sync with `version` in src-tauri/tauri.conf.json.)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
          - platform: macos-latest # Intel
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
          - platform: windows-latest
            target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev

      - name: Install frontend dependencies
        run: pnpm install

      # tauri-action builds the app, creates/updates the GitHub Release for this
      # tag, SIGNS the updater artifacts, generates `latest.json`, and uploads ONLY
      # the final installers + updater bundles + latest.json (no bundle folders).
      # Every matrix job targets the same release (keyed by tagName) and the action
      # merges each platform's entry into the one latest.json.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Musique ${{ github.ref_name }}"
          releaseBody: "Install once from the assets below — Musique auto-updates itself from here on."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
